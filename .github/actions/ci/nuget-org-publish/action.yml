name: "Deploy to nuget.org"
description: "Deploy to nuget.org"

inputs:
  token:
    description: "The token to use for nuget publishing"
    required: true

runs:
  using: "composite"

  steps:
  - name: Download Artifacts
    uses: actions/download-artifact@v4
    with:
        name: NuGet-Signed
        path: artifacts

  - name: Verify package dependencies on nuget.org
    shell: pwsh
    run: |
        ./build/Verify-NuGetDependenciesOnNuGetOrg.ps1 -PackagesPath artifacts -MaxAttempts 12 -RetryDelaySeconds 20 -HttpTimeoutSeconds 30

  - name: NuGet.org Push
    shell: pwsh
    run: |
        dotnet nuget push artifacts/*.nupkg -s https://api.nuget.org/v3/index.json -k "${{ inputs.token }}" --skip-duplicate

