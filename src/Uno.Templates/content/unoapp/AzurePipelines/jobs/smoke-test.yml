jobs:
- job: smoke_test
  cancelTimeoutInMinutes: 0
  displayName: Smoke Test (Debug Build of MyExtensionsApp.1)
  pool:
    vmImage: $(windowsAgent)
  steps:
    - checkout: self
      fetchDepth: 0

    - template: ../steps/install-dependencies.yml
      parameters:
        targetPlatform: 'wasm'

    - task: PowerShell@2
      displayName: 'Build MyExtensionsApp.1 (Debug)'
      inputs:
        targetType: 'inline'
        script: 'dotnet build ./MyExtensionsApp.1/MyExtensionsApp.1.csproj --configuration Debug'
        failOnStderr: true
        pwsh: true
