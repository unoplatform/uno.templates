name: CI

on:
  push:
    branches:
      - $DefaultBranchName$
      - release/**

  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - $DefaultBranchName$
      - release/**
env:
  STEP_TIMEOUT_MINUTES: 60

jobs:
  smoke_test:
    name: Smoke Test (Debug Build of MyExtensionsApp.1)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Install Dependencies
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        uses: "./.github/steps/install_dependencies"

      - name: Build MyExtensionsApp.1 (Debug)
        shell: pwsh
        run: dotnet build ./MyExtensionsApp.1/MyExtensionsApp.1.csproj --configuration Debug
#if (useUnitTests)

  unit_test:
    name: Unit Tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Install Dependencies
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        uses: "./.github/steps/install_dependencies"

      - name: Build MyExtensionsApp.1.Tests (Release)
        shell: pwsh
        run: dotnet build ./MyExtensionsApp.1.Tests/MyExtensionsApp.1.Tests.csproj --configuration Release -p:OverrideTargetFramework=$baseTargetFramework$

      - name: Run Unit Tests
        shell: pwsh
        run: dotnet test ./MyExtensionsApp.1.Tests/MyExtensionsApp.1.Tests.csproj --no-build -c Release --logger GitHubActions --blame-crash --collect:"XPlat Code Coverage" -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover
#else
#endif
